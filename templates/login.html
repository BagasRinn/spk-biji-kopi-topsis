<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Sistem SPK TOPSIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm" style="width: 24rem;">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">Supply Chain SPK</h4>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" required placeholder="admin / manajer">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-dark w-100">Masuk</button>
            </form>
            
            <div class="mt-3 text-center text-muted" style="font-size: 0.85rem;">
                Demo Akses:<br>
                Admin: <b>admin</b> (pass: admin123)<br>
                Manajer: <b>manajer</b> (pass: manajer123)
            </div>
        </div>
    </div>

</body>
</html>
